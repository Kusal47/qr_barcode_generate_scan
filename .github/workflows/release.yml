name: Flutter CI/CD Cross-Platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # REQUIRED for tagging + releases

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: '3.41.7' # Using the version we identified as compatible with pubspec sdk ^3.7.2

jobs:
  # =========================
  # TEST & ANALYZE
  # =========================
  test-and-analyze:
    name: Test & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      # - name: Analyze code
      #   run: flutter analyze

      # - name: Run tests
      #   run: flutter test

  # =========================
  # ANDROID BUILD & AUTO RELEASE
  # =========================
  build-and-release:
    name: Build Android & Auto Release
    runs-on: ubuntu-latest
    needs: test-and-analyze
    # Only run release on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      # Prepare Android Signing
      - name: Create key.properties
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        if: env.ANDROID_KEY_PROPERTIES != ''
        run: |
          echo "$ANDROID_KEY_PROPERTIES" > android/key.properties

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      # =========================
      # Upload artifacts
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # =========================
      # 🔢 AUTO VERSIONING
      # =========================
      - name: Get next version
        id: version
        run: |
          git fetch --tags
          # Get the latest tag, default to v1.0.0 if none exist
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.1"
          else
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT

      # =========================
      # 🔍 CHECK TAG EXISTS
      # =========================
      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.NEW_TAG }}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      # =========================
      # 🏷️ CREATE TAG (SAFE)
      # =========================
      - name: Create tag
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.version.outputs.NEW_TAG }}
          git push origin ${{ steps.version.outputs.NEW_TAG }}

      # =========================
      # 🚀 CREATE RELEASE
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.NEW_TAG }}
          name: Version ${{ steps.version.outputs.NEW_TAG }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
